name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sync versions across all packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Setting version to $VERSION across all packages"

          # Update all packages using our sync script (avoids npm warnings)
          node scripts/sync-versions.js "$VERSION"

      - name: Validate NPM_TOKEN is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured."
            echo "::error::Go to: https://github.com/defai-digital/AutomatosX/settings/secrets/actions"
            echo "::error::Add a secret named NPM_TOKEN with a valid npm access token."
            echo "::error::The token needs publish access to the @defai.digital npm org."
            exit 1
          fi
          echo "NPM_TOKEN is set (length: ${#NODE_AUTH_TOKEN})"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish all packages to npm
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Publishing version $VERSION..."

          # Collect all workspace package dirs via pnpm (handles any nesting depth)
          # pnpm list -r --depth -1 outputs all workspace packages
          publish_failed=0
          publish_skipped=0
          publish_success=0

          while IFS= read -r pkg_json; do
            pkg_dir=$(dirname "$pkg_json")
            pkg_name=$(node -p "require('./$pkg_json').name" 2>/dev/null || echo "")
            pkg_private=$(node -p "require('./$pkg_json').private ?? false" 2>/dev/null || echo "false")

            if [ -z "$pkg_name" ] || [ "$pkg_private" = "true" ]; then
              continue
            fi

            # Skip if this version is already published (idempotent)
            if npm view "${pkg_name}@${VERSION}" version 2>/dev/null | grep -q "^${VERSION}$"; then
              echo "::notice::Skipping $pkg_name@$VERSION (already published)"
              publish_skipped=$((publish_skipped + 1))
              continue
            fi

            echo "Publishing $pkg_name@$VERSION..."
            if (cd "$pkg_dir" && pnpm publish --access public --no-git-checks); then
              echo "✓ Published $pkg_name@$VERSION"
              publish_success=$((publish_success + 1))
            else
              echo "::error::Failed to publish $pkg_name@$VERSION"
              publish_failed=$((publish_failed + 1))
            fi
          done < <(find packages -name "package.json" -not -path "*/node_modules/*" -not -path "*/dist/*" | sort)

          echo ""
          echo "Publish summary:"
          echo "  ✓ Published: $publish_success"
          echo "  ↷ Skipped:   $publish_skipped"
          echo "  ✗ Failed:    $publish_failed"

          if [ "$publish_failed" -gt 0 ]; then
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            npm install -g @defai.digital/cli
            ```

            ## Quick Start

            ```bash
            # Check system health
            ax doctor

            # Run interactive setup
            ax setup

            # Make a provider call
            ax call claude "Hello, world!"
            ```

            ## What's Included

            This release publishes the following packages:
            - `@defai.digital/cli` - Main CLI tool
            - `@defai.digital/contracts` - Type definitions and schemas
            - `@defai.digital/mcp-server` - MCP server for AI tool integration
            - Plus all internal domain packages

            ## Version

            All packages are published at version `${{ steps.version.outputs.VERSION }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
